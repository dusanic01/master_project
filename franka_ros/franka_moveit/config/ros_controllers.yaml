fr3_arm_position_controller:
  type: position_controllers/JointTrajectoryController
  publish_rate: 1000
  joints:
    - fr3_joint1
    - fr3_joint2
    - fr3_joint3
    - fr3_joint4
    - fr3_joint5
    - fr3_joint6
    - fr3_joint7
  constraints:
    goal_time: 2.0
    stopped_velocity_tolerance: 0.05
    fr3_joint1: {trajectory: 0.03, goal: 0.1}
    fr3_joint2: {trajectory: 0.03, goal: 0.1}
    fr3_joint3: {trajectory: 0.03, goal: 0.1}
    fr3_joint4: {trajectory: 0.03, goal: 0.1}
    fr3_joint5: {trajectory: 0.03, goal: 0.1}
    fr3_joint6: {trajectory: 0.03, goal: 0.1}
    fr3_joint7: {trajectory: 0.03, goal: 0.1}

      
